<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>
  <link rel="stylesheet" href="css/global.css" />
</head>
<body>

  <button id="sidebar-toggle" type="button" aria-label="選單">☰</button>
  <div id="sidebar-backdrop"></div>
  <div id="layout-container">
    <aside id="sidebar" class="sketch-box">
      <div class="logo">
        <h1>Task Tracker</h1>
      </div>
      
      <!-- Current Workspace Info -->
      <div id="workspace-section" style="display: none;">
        <h3>WORKSPACE</h3>
        <div id="workspace-meta">
          <div class="meta-field">
            <select id="sidebar-ws-select" style="width: 100%; font-size: 0.95rem; padding: 0.25rem; font-family: inherit; background: #fff; border: 1px dashed #333; cursor: pointer;"></select>
          </div>
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav id="nav-menu">
        <a href="#/workspaces" id="nav-workspaces" class="nav-btn">Workspaces</a>
        <!-- Workspace Specific Links -->
        <div id="workspace-nav" style="display: none; flex-direction: column; gap: 0.8rem; margin-top: 0.5rem; border-top: 2px dashed #333; padding-top: 0.8rem;">
          <a href="#/tasks" id="nav-tasks" class="nav-btn">Kanban Board</a>
          <a href="#/members" id="nav-members" class="nav-btn">Members</a>
          <a href="#/search" id="nav-search" class="nav-btn">Search</a>
          <a href="#/audit" id="nav-audit" class="nav-btn">Audit Log</a>
        </div>
      </nav>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <div id="sidebar-user-email" class="muted" style="margin-bottom: 0.5rem; font-size: 0.9rem; word-break: break-all;"></div>
        <button id="logout-btn" type="button" class="btn-danger" style="display: none; width: 100%;">登出</button>
      </div>
    </aside>
    
    <main id="main-content">
      <div id="app"></div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
